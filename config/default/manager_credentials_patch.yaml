apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: MINIZITI_MANAGEMENT_SECRET_NAME
          value: openziti-management
        - name: MINIZITI_MANAGEMENT_SECRET_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
